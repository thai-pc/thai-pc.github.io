<script>
  // Follow the system theme by default; the toggle overrides it.
  (function () {
    try {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');

  })();

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased" style="font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
<div
  x-data="demoApp()"
  x-init="init()"
  @dragover.prevent="dragging = true"
  @dragleave.prevent="dragging = false"
  @drop.prevent="onDrop($event)"
  class="h-screen flex flex-col overflow-hidden select-none"
>
  <!-- Demo banner -->
  <div class="flex items-center gap-2 px-4 py-1.5 text-[11px] font-medium bg-accent-light dark:bg-accent/15 text-accent dark:text-accent-dark border-b border-accent/15">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <span>Interactive demo — runs entirely in your browser. Nothing is uploaded.</span>
  </div>

  <!-- Header -->
  <header class="flex items-center justify-between gap-3 px-4 py-2.5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
    <div class="flex items-center gap-3 min-w-0">
      <span dir="ltr" class="text-base font-bold tracking-tight shrink-0"><span class="text-accent dark:text-accent-dark">Flux</span><span class="text-gray-500 dark:text-gray-400">Files</span></span>
      <nav class="flex items-center gap-1 text-sm min-w-0 overflow-hidden">
        <button @click="goTo(-1)" class="px-1.5 py-0.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 shrink-0">Root</button>
        <template x-for="(c, i) in crumbs" :key="i">
          <span class="flex items-center gap-1 min-w-0">
            <span class="text-gray-300 dark:text-gray-600">›</span>
            <button @click="goTo(i)" class="px-1.5 py-0.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800 truncate" x-text="c"></button>
          </span>
        </template>
      </nav>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <div class="relative hidden sm:block">
        <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
        <input x-model="query" type="text" placeholder="Search…" class="pl-8 pr-2 py-1.5 w-40 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-accent/40" />
      </div>
      <button @click="toggleTheme()" title="Theme" class="p-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800">
        <svg x-show="!dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.36 6.36l-.7-.7M6.34 6.34l-.7-.7m12.72 0l-.7.7M6.34 17.66l-.7.7M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg x-show="dark" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
      <button @click="showTrash = true" title="Trash" class="relative p-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.87 12.14A2 2 0 0116.14 21H7.86a2 2 0 01-1.99-1.86L5 7m5 4v6m4-6v6M4 7h16M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
        <span x-show="trash.length" x-cloak class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-accent text-white text-[10px] flex items-center justify-center" x-text="trash.length"></span>
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="flex items-center justify-between gap-2 px-4 py-2 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
    <div class="flex items-center gap-2">
      <button @click="$refs.file.click()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg bg-accent text-white hover:bg-accent/90">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Upload
      </button>
      <input x-ref="file" type="file" multiple class="hidden" @change="onPick($event)" />
      <button @click="newFolder()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 11v4m-2-2h4"/></svg>
        New folder
      </button>
    </div>
    <div class="flex items-center gap-2">
      <button x-show="selected.length" x-cloak @click="deleteSelected()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg border border-rose-200 dark:border-rose-900/50 text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.87 12.14A2 2 0 0116.14 21H7.86a2 2 0 01-1.99-1.86L5 7m5 4v6m4-6v6M4 7h16M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
        <span x-text="'Delete (' + selected.length + ')'"></span>
      </button>
      <div class="flex rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
        <button @click="view='grid'" :class="view==='grid' ? 'bg-accent-light dark:bg-accent/20 text-accent dark:text-accent-dark' : 'text-gray-500'" class="p-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg></button>
        <button @click="view='list'" :class="view==='list' ? 'bg-accent-light dark:bg-accent/20 text-accent dark:text-accent-dark' : 'text-gray-500'" class="p-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Main scroll area -->
  <main class="flex-1 overflow-auto p-4" :class="dragging ? 'ring-2 ring-accent ring-inset' : ''">
    <!-- dropzone -->
    <button @click="$refs.file.click()" class="w-full mb-4 rounded-xl border-2 border-dashed border-gray-200 dark:border-gray-700 py-6 text-center text-gray-400 hover:border-accent/50 hover:text-accent transition-colors">
      <svg class="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.9A5 5 0 1115.9 6 5 5 0 0117 16M9 14l3-3 3 3m-3-3v9"/></svg>
      <div class="text-sm" x-text="dragging ? 'Drop to upload' : 'Drop images here or click to upload'"></div>
    </button>

    <div x-show="visible.length === 0" x-cloak class="text-center py-16 text-gray-400 text-sm">This folder is empty.</div>

    <!-- GRID -->
    <div x-show="view==='grid'" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
      <template x-for="it in visible" :key="it.id">
        <div
          @click="it.kind==='folder' ? enter(it) : toggleSelect(it.id)"
          :class="isSel(it.id) ? 'ring-2 ring-accent border-transparent' : 'border-gray-200 dark:border-gray-800'"
          class="group relative rounded-xl border bg-white dark:bg-gray-900 p-2.5 cursor-pointer hover:shadow-md hover:shadow-accent/5 transition-all"
        >
          <span x-show="it.kind!=='folder'" class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full" :class="isSel(it.id) ? 'bg-accent' : 'bg-emerald-400'"></span>
          <!-- thumb -->
          <div class="aspect-[4/3] rounded-lg mb-2 flex items-center justify-center overflow-hidden bg-gray-50 dark:bg-gray-800">
            <template x-if="it.kind==='folder'">
              <svg class="w-10 h-10 text-accent/70" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z"/></svg>
            </template>
            <template x-if="it.kind==='image' && it.src">
              <img :src="it.src" class="w-full h-full object-cover" :alt="it.name" />
            </template>
            <template x-if="it.kind==='image' && !it.src">
              <div class="w-full h-full thumb-grad" :style="'background-image:'+it.grad"></div>
            </template>
            <template x-if="it.kind==='file'">
              <svg class="w-9 h-9 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 3h7l5 5v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z"/><path stroke-linecap="round" stroke-linejoin="round" d="M14 3v5h5"/></svg>
            </template>
          </div>
          <div class="text-xs font-medium truncate" x-text="it.name" :title="it.name"></div>
          <div class="text-[11px] text-gray-400" x-text="it.kind==='folder' ? 'Folder' : it.size"></div>
        </div>
      </template>
    </div>

    <!-- LIST -->
    <div x-show="view==='list'" x-cloak class="rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-gray-900">
      <template x-for="it in visible" :key="it.id">
        <div @click="it.kind==='folder' ? enter(it) : toggleSelect(it.id)" :class="isSel(it.id) ? 'bg-accent-light dark:bg-accent/10' : ''" class="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800/60">
          <div class="w-8 h-8 rounded-md flex items-center justify-center shrink-0 overflow-hidden bg-gray-100 dark:bg-gray-800">
            <template x-if="it.kind==='folder'"><svg class="w-4 h-4 text-accent/70" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z"/></svg></template>
            <template x-if="it.kind==='image' && it.src"><img :src="it.src" class="w-full h-full object-cover" /></template>
            <template x-if="it.kind==='image' && !it.src"><div class="w-full h-full thumb-grad" :style="'background-image:'+it.grad"></div></template>
            <template x-if="it.kind==='file'"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 3h7l5 5v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z"/></svg></template>
          </div>
          <div class="flex-1 min-w-0"><div class="text-sm truncate" x-text="it.name"></div></div>
          <div class="text-xs text-gray-400" x-text="it.kind==='folder' ? 'Folder' : it.size"></div>
        </div>
      </template>
    </div>
  </main>

  <!-- Status bar -->
  <footer class="flex items-center justify-between px-4 py-1.5 text-[11px] text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
    <span x-text="visible.length + ' item' + (visible.length===1?'':'s')"></span>
    <span class="px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-800 font-medium">LOCAL · demo</span>
  </footer>

  <!-- Trash modal -->
  <div x-show="showTrash" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50" @click.self="showTrash=false">
    <div class="w-full max-w-lg rounded-xl bg-white dark:bg-gray-900 shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 dark:border-gray-800">
        <h3 class="font-semibold">Trash</h3>
        <div class="flex items-center gap-3">
          <button x-show="trash.length" @click="trash=[]" class="text-sm text-rose-600 dark:text-rose-400">Empty trash</button>
          <button @click="showTrash=false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>
      </div>
      <div class="px-4 py-2 text-xs text-gray-500 bg-gray-50 dark:bg-gray-800/50">Deleted files are kept here and can be restored. In the real product this lives in your own storage.</div>
      <div class="max-h-72 overflow-auto">
        <div x-show="trash.length===0" class="px-4 py-10 text-center text-sm text-gray-400">Trash is empty.</div>
        <template x-for="it in trash" :key="it.id">
          <div class="flex items-center gap-3 px-4 py-2 border-b border-gray-100 dark:border-gray-800">
            <div class="flex-1 min-w-0 text-sm truncate" x-text="it.name"></div>
            <button @click="restore(it)" class="text-sm text-accent dark:text-accent-dark hover:underline">Restore</button>
            <button @click="purge(it)" class="text-sm text-rose-600 dark:text-rose-400 hover:underline">Delete forever</button>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-cloak x-transition class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 text-sm shadow-lg" x-text="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
  function demoApp() {
    const grads = [
      'linear-gradient(160deg,#f472b6,#7c3aed)',
      'linear-gradient(160deg,#38bdf8,#1d4ed8)',
      'linear-gradient(160deg,#fbbf24,#b45309)',
      'linear-gradient(160deg,#34d399,#047857)',
      'linear-gradient(160deg,#818cf8,#1e3a8a)',
      'linear-gradient(160deg,#fb7185,#9f1239)',
      'linear-gradient(160deg,#2dd4bf,#0f766e)',
      'linear-gradient(160deg,#a78bfa,#5b21b6)',
    ];
    let _id = 0;
    const uid = () => 'i' + (++_id);
    const img = (name, dir, g) => ({ id: uid(), name, kind: 'image', dir, size: (18 + (g * 3) % 14) + '.' + (g % 9) + ' KB', grad: grads[g % grads.length] });
    const folder = (name, dir) => ({ id: uid(), name, kind: 'folder', dir });
    const file = (name, dir, size) => ({ id: uid(), name, kind: 'file', dir, size });

    return {
      items: [],
      path: [],            // current dir as array of folder names
      query: '',
      view: 'grid',
      selected: [],
      trash: [],
      showTrash: false,
      dragging: false,
      dark: false,
      toast: '',

      init() {
        this.dark = document.documentElement.classList.contains('dark');
        this.items = [
          folder('Product-photos', ''), folder('Brand-assets', ''), folder('Documents', ''),
          img('homepage-cover.jpg', '', 5),
          img('aurora-launch.jpg', 'Product-photos', 0), img('coastline-hero.jpg', 'Product-photos', 1),
          img('desert-dunes.jpg', 'Product-photos', 2), img('golden-field.jpg', 'Product-photos', 6),
          img('neon-tokyo.jpg', 'Product-photos', 7), img('pastel-sky.jpg', 'Product-photos', 4),
          img('city-skyline.jpg', 'Brand-assets', 4), img('studio-portrait.jpg', 'Brand-assets', 0),
          file('q2-report.pdf', 'Documents', '184 KB'), file('invoice-1042.pdf', 'Documents', '32 KB'),
        ];
      },

      get cwd() { return this.path.join('/'); },
      get crumbs() { return this.path; },
      get visible() {
        const q = this.query.trim().toLowerCase();
        return this.items
          .filter((it) => it.dir === this.cwd)
          .filter((it) => !q || it.name.toLowerCase().includes(q))
          .sort((a, b) => (a.kind === 'folder' ? 0 : 1) - (b.kind === 'folder' ? 0 : 1) || a.name.localeCompare(b.name));
      },

      enter(f) { this.path.push(f.name); this.selected = []; this.query = ''; },
      goTo(i) { this.path = i < 0 ? [] : this.path.slice(0, i + 1); this.selected = []; this.query = ''; },

      isSel(id) { return this.selected.includes(id); },
      toggleSelect(id) { this.isSel(id) ? (this.selected = this.selected.filter((x) => x !== id)) : this.selected.push(id); },

      newFolder() {
        const name = (window.prompt('New folder name', 'New folder') || '').trim();
        if (!name) return;
        this.items.push({ id: uid(), name, kind: 'folder', dir: this.cwd });
        this.flash('Folder “' + name + '” created');
      },

      onPick(e) { this.addFiles(e.target.files); e.target.value = ''; },
      onDrop(e) { this.dragging = false; this.addFiles(e.dataTransfer.files); },
      addFiles(fileList) {
        const list = Array.from(fileList || []);
        if (!list.length) return;
        let done = 0;
        list.forEach((f) => {
          const isImg = /^image\//.test(f.type);
          const size = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : Math.max(1, Math.round(f.size / 1024)) + ' KB';
          const item = { id: uid(), name: f.name, kind: isImg ? 'image' : 'file', dir: this.cwd, size, grad: grads[done % grads.length] };
          if (isImg) {
            const r = new FileReader();
            r.onload = () => { item.src = r.result; };
            r.readAsDataURL(f);
          }
          this.items.push(item);
          done++;
        });
        this.flash(list.length + ' file' + (list.length === 1 ? '' : 's') + ' uploaded (local preview)');
      },

      deleteSelected() {
        if (!this.selected.length) return;
        const moving = this.items.filter((it) => this.selected.includes(it.id));
        this.trash.unshift(...moving);
        this.items = this.items.filter((it) => !this.selected.includes(it.id));
        const n = this.selected.length;
        this.selected = [];
        this.flash(n + ' moved to trash');
      },
      restore(it) { this.trash = this.trash.filter((x) => x.id !== it.id); this.items.push(it); this.flash('Restored “' + it.name + '”'); },
      purge(it) { this.trash = this.trash.filter((x) => x.id !== it.id); },

      toggleTheme() { this.dark = !this.dark; document.documentElement.classList.toggle('dark', this.dark); },
      flash(msg) { this.toast = msg; clearTimeout(this._t); this._t = setTimeout(() => (this.toast = ''), 2200); },
    };
  }
</script>
</body>
</html>
